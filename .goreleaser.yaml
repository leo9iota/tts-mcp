project_name: tts-mcp

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: tts-mcp-server
    main: ./cmd/mcp
    binary: tts-mcp
    env:
      - CGO_ENABLED=1 # Required for cgo packages like beep
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
  - id: tts-mcp-cli
    main: ./cmd/cli
    binary: tts-mcp-config
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
